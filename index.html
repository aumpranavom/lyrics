<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Community Lyrics Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🎵 Community Lyrics Portal 🎵</h1>
</header>

<div class="container">

  <aside class="sidebar">
    <h3>Categories</h3>
    <ul>
      <li onclick="loadCategory('Hindi Movie Songs')">Hindi Movie Songs</li>
      <li onclick="loadCategory('English Movie Songs')">English Movie Songs</li>
      <li onclick="loadCategory('Ganesh Bhajans')">Ganesh Bhajans</li>
      <li onclick="loadCategory('Hanuman Bhajans')">Hanuman Bhajans</li>
      <li onclick="loadCategory('Krishna Bhajans')">Krishna Bhajans</li>
      <li onclick="loadCategory('Durga Bhajans')">Durga Bhajans</li>
      <li onclick="loadCategory('Guru Bhajans')">Guru Bhajans</li>
      <li onclick="loadCategory('Regional Folk Songs')">Regional Folk Songs</li>
    </ul>

    <button onclick="showForm()">➕ Add Lyrics</button>
  </aside>

  <main class="content">
    <div id="songList"></div>
    <div id="lyricsView"></div>
  </main>

</div>

<script src="app.js"></script>
</body>
</html>
